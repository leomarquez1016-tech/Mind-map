<!DOCTYPE html>
<html>

<head>
<title>Mind map</title>

<style>

body{
text-align:center;
font-family:Arial;
background:#f0f0f0;
}



/* contenedor del mapa */
.contenedor{
position:relative;
display:inline-block;
transition: transform 0.6s ease, opacity 0.6s ease;
}

/* imagen */
.contenedor img{
width:100%;
max-width:900px;
}

/* iconos */
.icono{
position:absolute;
font-size:30px;
cursor:pointer;
}

/* pantalla nueva */
.pantalla{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

opacity:0;
pointer-events:none;
transition: opacity 0.8s ease;
}

/* cuando se activa */
.pantalla.activa{
opacity:1;
pointer-events:auto;
}


</style>

</head>

<body>

<h1>Mind map</h1>

<!-- MAPA -->
<div class="contenedor">

<img src="mapa.png">

<span class="icono" style="top: 150px; left:180px;" onclick="Favoriteteachers()">⚛️</span>

<span class="icono" style="top:400px; left:650px;" onclick="HighSchool()">🐶</span>

<span class="icono" style="top:150px; left:740px;" onclick="Hobbies()">🌎</span>

<span class="icono" style="top:1px; left:450px;" onclick="Bestfriends()">🥇</span>

<span class="icono" style="top:350px; left:275px;" onclick="Favoritesubjects()">🐴</span>

</div>

<!-- PANTALLA DE INFO -->
<div id="pantallaInfo" class="pantalla">

<img id="imagenInfo" src="" width="300">

<p id="textoInfo"></p>

<button onclick="regresar()">Regresar</button>

</div>

<div id="info" class="info">
Haz clic en un icono
</div>

<script>

function abrirInfo(x, y, texto, imagen){

let contenedor = document.querySelector(".contenedor");
let pantalla = document.getElementById("pantallaInfo");

// 1. zoom hacia el icono
contenedor.style.transform =
`scale(2) translate(-${x}px, -${y}px)`;

// 2. desaparecer mapa
contenedor.style.opacity = "0";

// 3. mostrar pantalla nueva
setTimeout(() => {
pantalla.classList.add("activa");
}, 600);

// 4. cambiar contenido
document.getElementById("textoInfo").innerHTML = texto;
document.getElementById("imagenInfo").src = imagen;

}

// funciones de cada icono

function Bestfriends(){
abrirInfo(200, 100,
"",
"Bestfriends.png");
}

function Hobbies(){
abrirInfo(100, 250,
"",
"Hobbies.png");
}

function HighSchool(){
abrirInfo(350, 150,
"",
"HighSchool.png");
}

function Favoritesubjects(){
abrirInfo(100, 250,
"",
"Favoriteteachers.png");
}

function Favoriteteachers(){
abrirInfo(100, 250,
"",
"Favoritesubjects.png");
}



// botón regresar

function regresar(){
   

let contenedor = document.querySelector(".contenedor");
let pantalla = document.getElementById("pantallaInfo");

// ocultar pantalla
pantalla.classList.remove("activa");

// regresar mapa
setTimeout(() => {
contenedor.style.transform = "scale(1)";
contenedor.style.opacity = "1";
}, 300);

}

</script>

</body>

</html>
